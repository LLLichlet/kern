name: Setup LLVM
description: Install the LLVM toolchain and platform prerequisites used by Kern CI.

inputs:
  mode:
    description: Which CI toolchain policy mode to resolve.
    required: false
    default: current
  host-target:
    description: Host archive target label for target-specific toolchain policy resolution.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Resolve Rust Toolchain (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        echo "PATH=$PATH"
        echo "cargo=$(command -v cargo || true)"
        cargo --version 2>&1 | head -n 5 || true
        echo "rustup=$(command -v rustup || true)"
        rustup --version 2>&1 | head -n 5 || true
        ls -la "$HOME/.cargo/bin" || true
        file "$(command -v cargo || true)" || true

        if ! CARGO_BIN="$(rustup which cargo 2>/dev/null)"; then
          CARGO_CMD="$(command -v cargo || true)"
          if [ -z "$CARGO_CMD" ]; then
            echo "Unable to find cargo in PATH after Rust setup" >&2
            exit 1
          fi
          if "$CARGO_CMD" --help 2>&1 | grep -q "rustup-init"; then
            echo "rustup could not resolve cargo; attempting rustup-init repair through $CARGO_CMD"
            "$CARGO_CMD" -y --default-toolchain stable --profile minimal
          else
            echo "rustup could not resolve cargo; reinstalling stable toolchain"
            rustup toolchain install stable --profile minimal
            rustup default stable
          fi
          hash -r
          CARGO_BIN="$(rustup which cargo)"
        fi
        "$CARGO_BIN" --version
        echo "KERN_CI_CARGO=$CARGO_BIN" >> "$GITHUB_ENV"
        echo "$(dirname "$CARGO_BIN")" >> "$GITHUB_PATH"

    - name: Resolve Rust Toolchain (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        Write-Host "PATH=$env:PATH"
        $cargoCommand = Get-Command cargo -ErrorAction SilentlyContinue
        $rustupCommand = Get-Command rustup -ErrorAction SilentlyContinue
        Write-Host "cargo=$($cargoCommand.Source)"
        try { cargo --version } catch { Write-Host "cargo --version failed: $($_.Exception.Message)" }
        Write-Host "rustup=$($rustupCommand.Source)"
        try { rustup --version } catch { Write-Host "rustup --version failed: $($_.Exception.Message)" }
        if (Test-Path "$env:USERPROFILE\.cargo\bin") {
          Get-ChildItem "$env:USERPROFILE\.cargo\bin" | Format-Table -AutoSize
        }

        $cargoBin = $null
        try {
          $cargoBin = (rustup which cargo).Trim()
        } catch {
          if ($null -eq $cargoCommand) {
            throw "Unable to find cargo in PATH after Rust setup"
          }
          $cargoHelp = (& $cargoCommand.Source --help 2>&1) -join "`n"
          if ($cargoHelp -match "rustup-init") {
            Write-Host "rustup could not resolve cargo; attempting rustup-init repair through $($cargoCommand.Source)"
            & $cargoCommand.Source -y --default-toolchain stable --profile minimal
          } else {
            Write-Host "rustup could not resolve cargo; reinstalling stable toolchain"
            rustup toolchain install stable --profile minimal
            rustup default stable
          }
          $env:PATH = "$env:USERPROFILE\.cargo\bin;$env:PATH"
          $cargoBin = (rustup which cargo).Trim()
        }
        & $cargoBin --version
        echo "KERN_CI_CARGO=$cargoBin" >> $env:GITHUB_ENV
        echo (Split-Path $cargoBin) >> $env:GITHUB_PATH

    - name: Resolve CI Toolchain Policy (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        "${KERN_CI_CARGO:-cargo}" run -q -p kernworker -- ci toolchain-spec --runner-os "${{ runner.os }}" --mode "${{ inputs.mode }}" --host-target "${{ inputs.host-target }}" --format github-env >> "$GITHUB_ENV"

    - name: Resolve CI Toolchain Policy (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $cargoBin = if ($env:KERN_CI_CARGO) { $env:KERN_CI_CARGO } else { "cargo" }
        & $cargoBin run -q -p kernworker -- ci toolchain-spec --runner-os "${{ runner.os }}" --mode "${{ inputs.mode }}" --host-target "${{ inputs.host-target }}" --format github-env >> $env:GITHUB_ENV

    - name: Install LLVM 21 (Linux Package Manager)
      if: runner.os == 'Linux' && env.KERN_CI_PROVIDER_KIND == 'package-manager'
      shell: bash
      run: |
        wget https://apt.llvm.org/llvm.sh
        chmod +x llvm.sh
        sudo ./llvm.sh "${KERN_CI_LLVM_MAJOR}"
        sudo apt-get install -y ${KERN_CI_APT_PACKAGES}
        LLVM_PREFIX="$(llvm-config-${KERN_CI_LLVM_MAJOR} --prefix)"
        echo "${KERN_CI_LLVM_PREFIX_ENV}=$LLVM_PREFIX" >> "$GITHUB_ENV"
        echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"

    - name: Install LLVM 21 (macOS Package Manager)
      if: runner.os == 'macOS' && env.KERN_CI_PROVIDER_KIND == 'package-manager'
      shell: bash
      env:
        HOMEBREW_NO_AUTO_UPDATE: "1"
      run: |
        LLVM_FORMULA="${KERN_CI_BREW_PRIMARY_FORMULA}"
        if ! brew info "$LLVM_FORMULA" >/dev/null 2>&1; then
          LLVM_FORMULA="${KERN_CI_BREW_FALLBACK_FORMULA}"
        fi
        brew install "$LLVM_FORMULA" ${KERN_CI_BREW_EXTRA_FORMULAS}
        LLVM_PREFIX="$(brew --prefix "$LLVM_FORMULA")"
        echo "${KERN_CI_LLVM_PREFIX_ENV}=$LLVM_PREFIX" >> "$GITHUB_ENV"
        echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"
        for EXTRA_FORMULA in ${KERN_CI_BREW_EXTRA_FORMULAS}; do
          EXTRA_PREFIX="$(brew --prefix "$EXTRA_FORMULA")"
          if [ -d "$EXTRA_PREFIX/bin" ]; then
            echo "$EXTRA_PREFIX/bin" >> "$GITHUB_PATH"
          fi
        done
        echo "PKG_CONFIG_PATH=$(brew --prefix libxml2)/lib/pkgconfig" >> "$GITHUB_ENV"

    - name: Cache LLVM Archive Install
      id: cache-llvm
      if: env.KERN_CI_PROVIDER_KIND == 'archive'
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/${{ env.KERN_CI_INSTALL_DIR }}
        key: ${{ runner.os }}-${{ env.KERN_CI_MODE }}-${{ env.KERN_CI_HOST_TARGET }}-${{ env.KERN_CI_TOOLCHAIN_PROVIDER }}-llvm-${{ env.KERN_CI_LLVM_VERSION }}

    - name: Install LLVM Archive (Unix)
      if: runner.os != 'Windows' && env.KERN_CI_PROVIDER_KIND == 'archive' && steps.cache-llvm.outputs.cache-hit != 'true'
      shell: bash
      run: |
        curl -L "${KERN_CI_ARCHIVE_URL}" -o llvm.archive
        "${KERN_CI_CARGO:-cargo}" run -q -p kernworker -- ci verify-toolchain-archive --runner-os "${{ runner.os }}" --mode "${{ inputs.mode }}" --host-target "${{ inputs.host-target }}" --archive-path llvm.archive
        tar -xf llvm.archive
        rm -rf "${KERN_CI_INSTALL_DIR}"
        mv "${KERN_CI_ARCHIVE_ROOT}" "${KERN_CI_INSTALL_DIR}"

    - name: Install LLVM Archive (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_PROVIDER_KIND == 'archive' && steps.cache-llvm.outputs.cache-hit != 'true'
      shell: powershell
      run: |
        Invoke-WebRequest -Uri $env:KERN_CI_ARCHIVE_URL -OutFile "llvm.archive"
        $cargoBin = if ($env:KERN_CI_CARGO) { $env:KERN_CI_CARGO } else { "cargo" }
        & $cargoBin run -q -p kernworker -- ci verify-toolchain-archive --runner-os "${{ runner.os }}" --mode "${{ inputs.mode }}" --host-target "${{ inputs.host-target }}" --archive-path llvm.archive
        tar -xf llvm.archive
        Remove-Item -Recurse -Force $env:KERN_CI_INSTALL_DIR -ErrorAction SilentlyContinue
        Rename-Item $env:KERN_CI_ARCHIVE_ROOT $env:KERN_CI_INSTALL_DIR

    - name: Configure LLVM Archive Provider (Unix)
      if: runner.os != 'Windows' && env.KERN_CI_PROVIDER_KIND == 'archive'
      shell: bash
      run: |
        LLVM_PREFIX="${GITHUB_WORKSPACE}/${KERN_CI_INSTALL_DIR}"
        if [ -n "${KERN_CI_ARCHIVE_PREFIX_SUBDIR}" ]; then
          LLVM_PREFIX="${LLVM_PREFIX}/${KERN_CI_ARCHIVE_PREFIX_SUBDIR}"
        fi
        echo "${KERN_CI_LLVM_PREFIX_ENV}=$LLVM_PREFIX" >> "$GITHUB_ENV"
        echo "$LLVM_PREFIX/bin" >> "$GITHUB_PATH"

    - name: Configure LLVM Archive Provider (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_PROVIDER_KIND == 'archive'
      shell: powershell
      run: |
        $llvmPath = (Resolve-Path $env:KERN_CI_INSTALL_DIR).Path
        if ($env:KERN_CI_ARCHIVE_PREFIX_SUBDIR -ne "") {
          $llvmPath = (Join-Path $llvmPath $env:KERN_CI_ARCHIVE_PREFIX_SUBDIR)
        }
        echo "$env:KERN_CI_LLVM_PREFIX_ENV=$llvmPath" >> $env:GITHUB_ENV
        echo "$llvmPath\bin" >> $env:GITHUB_PATH

    - name: Configure macOS SDK Environment
      if: runner.os == 'macOS'
      shell: bash
      run: |
        echo "SDKROOT=$(xcrun --show-sdk-path)" >> "$GITHUB_ENV"

    - name: Configure vcpkg Binary Cache (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_WINDOWS_VCPKG_PACKAGE != ''
      shell: powershell
      run: |
        $cachePath = "$env:GITHUB_WORKSPACE\.vcpkg-cache"
        $libCachePath = "$env:GITHUB_WORKSPACE\.vcpkg-lib-cache"
        New-Item -ItemType Directory -Force -Path $cachePath | Out-Null
        New-Item -ItemType Directory -Force -Path $libCachePath | Out-Null
        echo "VCPKG_DEFAULT_BINARY_CACHE=$cachePath" >> $env:GITHUB_ENV
        echo "KERN_CI_WINDOWS_LIBXML2_CACHE=$libCachePath" >> $env:GITHUB_ENV

    - name: Cache vcpkg Binary Artifacts (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_WINDOWS_VCPKG_PACKAGE != ''
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}\.vcpkg-cache
        key: ${{ runner.os }}-${{ env.KERN_CI_WINDOWS_VCPKG_CACHE_KEY }}

    - name: Cache libxml2 Library (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_WINDOWS_VCPKG_PACKAGE != ''
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}\.vcpkg-lib-cache
        key: ${{ runner.os }}-${{ env.KERN_CI_WINDOWS_VCPKG_CACHE_KEY }}-lib

    - name: Install libxml2 via vcpkg (Windows)
      if: runner.os == 'Windows' && env.KERN_CI_WINDOWS_VCPKG_PACKAGE != ''
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"
        $vcpkgLib = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static\lib\libxml2.lib"
        $llvmLib = "$env:KERN_CI_INSTALL_DIR\lib\libxml2s.lib"
        $cachedLib = Join-Path $env:KERN_CI_WINDOWS_LIBXML2_CACHE "libxml2.lib"

        function Restore-Libxml2FromBinaryCache {
          param(
            [string] $CacheRoot,
            [string] $Destination
          )

          if (-not (Test-Path $CacheRoot)) {
            return $false
          }

          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $archives = Get-ChildItem -Path $CacheRoot -Recurse -File -Include *.zip, *.nupkg -ErrorAction SilentlyContinue
          foreach ($archive in $archives) {
            try {
              $zip = [System.IO.Compression.ZipFile]::OpenRead($archive.FullName)
              try {
                $entry = $null
                foreach ($candidate in $zip.Entries) {
                  $entryName = $candidate.FullName -replace '\\', '/'
                  if ($entryName -match '(^|/)lib/libxml2\.lib$') {
                    $entry = $candidate
                    break
                  }
                }
                if ($null -ne $entry) {
                  New-Item -ItemType Directory -Force -Path (Split-Path $Destination) | Out-Null
                  [System.IO.Compression.ZipFileExtensions]::ExtractToFile($entry, $Destination, $true)
                  Write-Host "Restored libxml2.lib from vcpkg binary cache archive $($archive.FullName)"
                  return $true
                }
              } finally {
                $zip.Dispose()
              }
            } catch {
              Write-Host "Skipping unreadable vcpkg cache archive $($archive.FullName): $($_.Exception.Message)"
            }
          }

          return $false
        }

        if (-not (Test-Path $cachedLib)) {
          $restored = Restore-Libxml2FromBinaryCache -CacheRoot $env:VCPKG_DEFAULT_BINARY_CACHE -Destination $cachedLib
          if (-not $restored) {
            vcpkg install $env:KERN_CI_WINDOWS_VCPKG_PACKAGE "--binarysource=clear;files,$env:VCPKG_DEFAULT_BINARY_CACHE,readwrite"
            if ($LASTEXITCODE -ne 0) {
              throw "vcpkg install failed with exit code $LASTEXITCODE"
            }
            if (-not (Test-Path $vcpkgLib)) {
              throw "vcpkg install completed but expected library was not found: $vcpkgLib"
            }
            New-Item -ItemType Directory -Force -Path (Split-Path $cachedLib) | Out-Null
            Copy-Item $vcpkgLib -Destination $cachedLib -Force
          }
        }

        if (-not (Test-Path $cachedLib)) {
          throw "libxml2.lib was not available after vcpkg setup: $cachedLib"
        }
        Copy-Item $cachedLib -Destination $llvmLib -Force
