name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  nix:
    name: Verify Nix Flake
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: Show Flake Outputs
        run: nix flake show --no-write-lock-file

      - name: Run Flake Checks
        run: nix flake check --no-write-lock-file

  verify:
    name: Verify ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-24.04
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
            test_mode: all
          - name: windows
            os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_ext: zip
            test_mode: smoke
          - name: macos
            os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact_ext: tar.gz
            test_mode: all

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: bootstrap
          host-target: ${{ matrix.target }}

      - name: Activate Kern Toolchain (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> "$GITHUB_ENV"

      - name: Activate Kern Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> $env:GITHUB_ENV

      - name: Print Bootstrap Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Print Bootstrap Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Assert Bootstrap Toolchain Health (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Assert Bootstrap Toolchain Health (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Package Controlled Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo build --release -p kernc_cli --bin kernc
          cargo build --release -p craft
          cargo build --release -p kern-lsp
          TOOLCHAIN_VERSION=llvm-${KERN_CI_LLVM_VERSION}-ci
          cargo run -q -p kernworker -- release package-toolchain --version "$TOOLCHAIN_VERSION" --target "${{ matrix.target }}"
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-${TOOLCHAIN_VERSION}-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> "$GITHUB_ENV"

      - name: Package Controlled Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS = "-C target-feature=+crt-static"
          cargo build --release --target ${{ matrix.rust_target }} -p kernc_cli --bin kernc
          cargo build --release --target ${{ matrix.rust_target }} -p craft
          cargo build --release --target ${{ matrix.rust_target }} -p kern-lsp
          $TOOLCHAIN_VERSION = "llvm-$env:KERN_CI_LLVM_VERSION-ci"
          cargo run -q -p kernworker -- release package-toolchain --version $TOOLCHAIN_VERSION --target ${{ matrix.target }}
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-$TOOLCHAIN_VERSION-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $env:GITHUB_ENV

      - name: Verify Controlled Toolchain Artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo run -q -p kernworker -- ci verify-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --target "${{ matrix.target }}"

      - name: Verify Controlled Toolchain Artifact (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo run -q -p kernworker -- ci verify-packaged-toolchain --archive-path $env:TOOLCHAIN_ARTIFACT_FILE --target ${{ matrix.target }}

      - name: Install Controlled Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo run -q -p kernworker -- ci install-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --dest "${RUNNER_TEMP}/kern-ci-toolchain" --target "${{ matrix.target }}" --format github-env >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}/kern-ci-toolchain/toolchain/host/bin" >> "$GITHUB_PATH"

      - name: Install Controlled Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo run -q -p kernworker -- ci install-packaged-toolchain --archive-path $env:TOOLCHAIN_ARTIFACT_FILE --dest "$env:RUNNER_TEMP\kern-ci-toolchain" --target ${{ matrix.target }} --format github-env >> $env:GITHUB_ENV
          echo "$env:RUNNER_TEMP\kern-ci-toolchain\toolchain\host\bin" >> $env:GITHUB_PATH

      - name: Print Controlled Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Print Controlled Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Assert Controlled Toolchain Health (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Assert Controlled Toolchain Health (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Install VS Code Extension Dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Run kernc Integration Tests (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Run kernc Integration Tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Test craft (Unix)
        if: runner.os != 'Windows'
        run: cargo test -p craft

      - name: Test craft (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo test -p craft

      - name: Build Examples With Craft (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p craft -- build --project-path examples --examples

      - name: Build Examples With Craft (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p craft -- build --project-path examples --examples

      - name: Check craft Release Source Policy (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci craft-policy

      - name: Check craft Release Source Policy (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci craft-policy

      - name: Test kern-lsp (Unix)
        if: runner.os != 'Windows'
        run: cargo test -p kern-lsp

      - name: Test kern-lsp (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo test -p kern-lsp

      - name: Check VS Code Extension
        working-directory: editors/vscode
        run: |
          npm run check
          npm run test

      - name: Package VS Code Extension Smoke Artifact
        if: runner.os == 'Linux'
        working-directory: editors/vscode
        run: |
          npm run package:vsix
          cargo run -q -p kernworker -- ci verify-vsix

  verify-bootstrap-toolchain-assembly:
    name: Verify Bootstrap Toolchain Assembly
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Bootstrap LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: bootstrap
          host-target: x86_64-linux-gnu

      - name: Activate Bootstrap Toolchain
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> "$GITHUB_ENV"

      - name: Print Bootstrap Toolchain Diagnostics
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Assert Bootstrap Toolchain Health
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Package Bootstrap Toolchain Artifact
        run: |
          TOOLCHAIN_VERSION=llvm-${KERN_CI_LLVM_VERSION}-bootstrap-check
          cargo run -q -p kernworker -- release package-toolchain --version "$TOOLCHAIN_VERSION" --target x86_64-linux-gnu
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-${TOOLCHAIN_VERSION}-x86_64-linux-gnu.tar.gz" >> "$GITHUB_ENV"

      - name: Verify Bootstrap Toolchain Artifact
        run: |
          cargo run -q -p kernworker -- ci verify-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --target x86_64-linux-gnu
