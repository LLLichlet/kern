name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
          - name: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - name: macos
            os: macos-14
            rust_target: aarch64-apple-darwin

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm

      - name: Run kernc Integration Tests
        run: cargo test -p kernc_cli --tests
