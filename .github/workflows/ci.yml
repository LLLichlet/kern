name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-24.04
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            test_mode: all
          - name: windows
            os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            test_mode: smoke
          - name: macos
            os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            test_mode: all

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: target
          host-target: ${{ matrix.target }}

      - name: Export Kern Toolchain Root (Unix)
        if: runner.os != 'Windows'
        run: |
          echo "KERN_TOOLCHAIN_ROOT=${LLVM_SYS_211_PREFIX}" >> "$GITHUB_ENV"
          echo "KERN_DEBUG_LTO_LINK=1" >> "$GITHUB_ENV"

      - name: Export Kern Toolchain Root (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          echo "KERN_TOOLCHAIN_ROOT=$env:LLVM_SYS_211_PREFIX" >> $env:GITHUB_ENV
          echo "KERN_DEBUG_LTO_LINK=1" >> $env:GITHUB_ENV

      - name: Print Published Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: python3 -m ops ci toolchain-info

      - name: Print Published Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: py -3 -m ops ci toolchain-info

      - name: Assert Published Toolchain Health (Unix)
        if: runner.os != 'Windows'
        run: python3 -m ops ci toolchain-health

      - name: Assert Published Toolchain Health (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: py -3 -m ops ci toolchain-health

      - name: Install VS Code Extension Dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Run kernc Integration Tests (Unix)
        if: runner.os != 'Windows'
        run: python3 -m ops ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Run kernc Integration Tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: py -3 -m ops ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Test craft (Unix)
        if: runner.os != 'Windows'
        run: cargo test -p craft

      - name: Test craft (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo test -p craft

      - name: Check craft Release Source Policy (Unix)
        if: runner.os != 'Windows'
        run: python3 -m ops ci craft-policy

      - name: Check craft Release Source Policy (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: py -3 -m ops ci craft-policy

      - name: Test kern-lsp (Unix)
        if: runner.os != 'Windows'
        run: cargo test -p kern-lsp

      - name: Test kern-lsp (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo test -p kern-lsp

      - name: Check VS Code Extension
        working-directory: editors/vscode
        run: |
          npm run check
          npm run test

      - name: Package VS Code Extension Smoke Artifact
        if: runner.os == 'Linux'
        working-directory: editors/vscode
        run: |
          cargo build --release -p kern-lsp
          npm run package:vsix -- --target linux-x64 --server-source ../../target/release/kern-lsp
          python - <<'PY'
          import json
          import sys
          import zipfile

          with open("package.json", "r", encoding="utf-8") as fh:
              package_version = json.load(fh)["version"]
          package_path = f"kern-vscode-{package_version}-linux-x64.vsix"
          with zipfile.ZipFile(package_path) as archive:
              names = set(archive.namelist())
              required = {
                  "extension/extension.js",
                  "extension/out/extension.js",
                  "extension/server/linux-x64/kern-lsp",
              }
              missing = sorted(required - names)
              if missing:
                  raise SystemExit(f"missing VSIX entries: {missing}")
              leaked = sorted(name for name in names if "node_modules/" in name)
              if leaked:
                  raise SystemExit(f"unexpected node_modules in VSIX: {leaked[:10]}")
          PY

  verify-bootstrap-toolchain-assembly:
    name: Verify Bootstrap Toolchain Assembly
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Bootstrap LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: bootstrap
          host-target: x86_64-linux-gnu

      - name: Export Bootstrap Toolchain Root
        run: |
          echo "KERN_TOOLCHAIN_ROOT=${LLVM_SYS_211_PREFIX}" >> "$GITHUB_ENV"
          echo "KERN_DEBUG_LTO_LINK=1" >> "$GITHUB_ENV"

      - name: Print Bootstrap Toolchain Diagnostics
        run: python3 -m ops ci toolchain-info

      - name: Assert Bootstrap Toolchain Health
        run: python3 -m ops ci toolchain-health

      - name: Package Bootstrap Toolchain Artifact
        run: |
          TOOLCHAIN_VERSION=llvm-${KERN_CI_LLVM_VERSION}-bootstrap-check
          python3 -m ops release package-toolchain --version "$TOOLCHAIN_VERSION" --target x86_64-linux-gnu
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-${TOOLCHAIN_VERSION}-x86_64-linux-gnu.tar.gz" >> "$GITHUB_ENV"

      - name: Verify Bootstrap Toolchain Artifact
        run: |
          python3 -m ops ci verify-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --target x86_64-linux-gnu
