name: CI

on:
  pull_request:
  push:
    branches:
      - main
    paths-ignore:
      - "**/*.md"
      - "LICENSE"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    name: Verify ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            test_mode: all
          - name: windows
            os: windows-latest
            rust_target: x86_64-pc-windows-msvc
            test_mode: smoke
          - name: macos
            os: macos-14
            rust_target: aarch64-apple-darwin
            test_mode: all

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm

      - name: Run kernc Integration Tests (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/run_kernc_cli_tests.sh ${{ matrix.test_mode }}

      - name: Run kernc Integration Tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\run_kernc_cli_tests.ps1 -Mode ${{ matrix.test_mode }}
