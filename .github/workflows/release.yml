name: Release Kern Compiler

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build-and-release:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            artifact_name: kern-linux.tar.gz
            script_ext: .sh
          - os: windows-latest
            target: x86_64-windows-msvc
            artifact_name: kern-windows.zip
            script_ext: .ps1
    
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu, x86_64-pc-windows-msvc

      # ==========================================
      # Linux 专属步骤
      # ==========================================
      - name: Install LLVM 21 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 21
          sudo apt-get install -y llvm-21-dev libclang-21-dev libpolly-21-dev libzstd-dev zlib1g-dev
          echo "LLVM_SYS_211_PREFIX=$(llvm-config-21 --prefix)" >> $GITHUB_ENV

      - name: Package Toolchain (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          cargo build --release
          VERSION=${GITHUB_REF#refs/tags/}
          ./scripts/package_release.sh $VERSION ${{ matrix.target }}
          echo "ARTIFACT_FILE=kern-${VERSION}-${{ matrix.target }}.tar.gz" >> $GITHUB_ENV

      # ==========================================
      # Windows 专属步骤
      # ==========================================
      - name: Setup LLVM 21 (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # 下载官方预编译的 LLVM
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-21.1.8/clang+llvm-21.1.8-x86_64-pc-windows-msvc.tar.xz" -OutFile "llvm.tar.xz"
          
          # 解压 (Windows 11 自带 tar 支持)
          tar -xf llvm.tar.xz
          Rename-Item "clang+llvm-21.1.8-x86_64-pc-windows-msvc" "LLVM-21"
          
          # 欺骗 Linker: 复制并重命名 libxml2.lib 到 libxml2s.lib
          # 注意：如果在 Actions 环境中缺失，我们可以通过 vcpkg 安装，但通常 Actions 镜像的预装库已经足够让其跑通
          # 我们先用简单方案，如果由于缺少 xml2 报错，可以在这里插入快速注入方案
          
          $llvm_path = (Resolve-Path "LLVM-21").Path
          echo "LLVM_SYS_211_PREFIX=$llvm_path" >> $env:GITHUB_ENV
          echo "$llvm_path\bin" >> $env:GITHUB_PATH

      - name: Fix libxml2s for inkwell (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          # 空壳存根方案：快速生成一个假的 libxml2s.lib 骗过链接器
          # 因为我们的编译器不需要解析 Windows Manifest XML，这完全安全。
          echo "void dummy(){}" > dummy.c
          clang -c dummy.c -o dummy.o
          llvm-lib dummy.o /OUT:LLVM-21\lib\libxml2s.lib

      - name: Package Toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          cargo build --release
          $VERSION = $env:GITHUB_REF.Replace("refs/tags/", "")
          .\scripts\package_release.ps1 -Version $VERSION -Target ${{ matrix.target }}
          echo "ARTIFACT_FILE=kern-$VERSION-${{ matrix.target }}.zip" >> $env:GITHUB_ENV

      # ==========================================
      # 公共发布步骤
      # ==========================================
      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_FILE }}
          generate_release_notes: true