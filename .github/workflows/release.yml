name: Release Kern Toolchain

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label to use for a dry-run release build.
        required: true
        default: v0.0.0-dev

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
            test_mode: all
          - os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_ext: zip
            test_mode: smoke
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            artifact_ext: tar.gz
            test_mode: all
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact_ext: tar.gz
            test_mode: all

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        if: matrix.target == 'x86_64-linux-gnu'
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: bootstrap
          host-target: ${{ matrix.target }}

      - name: Activate Kern Toolchain (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> "$GITHUB_ENV"

      - name: Activate Kern Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> $env:GITHUB_ENV

      - name: Print CI Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Print CI Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Assert CI Toolchain Health (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Assert CI Toolchain Health (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Install VS Code Extension Dependencies
        if: matrix.target == 'x86_64-linux-gnu'
        working-directory: editors/vscode
        run: npm ci

      - name: Resolve Release Version (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "KERN_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "KERN_RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Resolve Release Version (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "KERN_RELEASE_VERSION=${{ inputs.version }}" >> $env:GITHUB_ENV
          } else {
            $version = $env:GITHUB_REF.Replace("refs/tags/", "")
            echo "KERN_RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          }

      - name: Run kernc Integration Tests (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Run kernc Integration Tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci kernc-tests --mode ${{ matrix.test_mode }}

      - name: Check craft Release Source Policy (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci craft-policy

      - name: Check craft Release Source Policy (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci craft-policy

      - name: Package Toolchain (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release -p kernc_cli --bin kernc
          cargo build --release -p craft
          cargo build --release -p kern-lsp
          TOOLCHAIN_VERSION=llvm-${KERN_CI_LLVM_VERSION}
          cargo run -q -p kernworker -- release package-toolchain --version "$TOOLCHAIN_VERSION" --target "${{ matrix.target }}"
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-${TOOLCHAIN_VERSION}-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $GITHUB_ENV

      - name: Package Toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $env:CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_RUSTFLAGS = "-C target-feature=+crt-static"
          cargo build --release --target ${{ matrix.rust_target }} -p kernc_cli --bin kernc
          cargo build --release --target ${{ matrix.rust_target }} -p craft
          cargo build --release --target ${{ matrix.rust_target }} -p kern-lsp
          $TOOLCHAIN_VERSION = "llvm-$env:KERN_CI_LLVM_VERSION"
          cargo run -q -p kernworker -- release package-toolchain --version $TOOLCHAIN_VERSION --target ${{ matrix.target }}
          echo "TOOLCHAIN_ARTIFACT_FILE=kern-toolchain-$TOOLCHAIN_VERSION-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $env:GITHUB_ENV

      - name: Verify Packaged Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo run -q -p kernworker -- ci verify-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --target "${{ matrix.target }}"

      - name: Verify Packaged Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo run -q -p kernworker -- ci verify-packaged-toolchain --archive-path $env:TOOLCHAIN_ARTIFACT_FILE --target ${{ matrix.target }}

      - name: Install Packaged Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo run -q -p kernworker -- ci install-packaged-toolchain --archive-path "${{ env.TOOLCHAIN_ARTIFACT_FILE }}" --dest "${RUNNER_TEMP}/kern-release-toolchain" --target "${{ matrix.target }}" --format github-env >> "$GITHUB_ENV"
          echo "${RUNNER_TEMP}/kern-release-toolchain/toolchain/host/bin" >> "$GITHUB_PATH"

      - name: Install Packaged Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo run -q -p kernworker -- ci install-packaged-toolchain --archive-path $env:TOOLCHAIN_ARTIFACT_FILE --dest "$env:RUNNER_TEMP\kern-release-toolchain" --target ${{ matrix.target }} --format github-env >> $env:GITHUB_ENV
          echo "$env:RUNNER_TEMP\kern-release-toolchain\toolchain\host\bin" >> $env:GITHUB_PATH

      - name: Print Controlled Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Print Controlled Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Package SDK (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          VERSION=${KERN_RELEASE_VERSION}
          cargo run -q -p kernworker -- release package --version "$VERSION" --target "${{ matrix.target }}" --skip-build
          echo "ARTIFACT_FILE=kern-${VERSION}-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $GITHUB_ENV

      - name: Package SDK (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $VERSION = $env:KERN_RELEASE_VERSION
          cargo run -q -p kernworker -- release package --version $VERSION --target ${{ matrix.target }} --skip-build
          echo "ARTIFACT_FILE=kern-$VERSION-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $env:GITHUB_ENV

      - name: Smoke Install Packaged SDK (Unix)
        if: runner.os != 'Windows'
        run: |
          cargo run -q -p kernup -- install --archive "${{ env.ARTIFACT_FILE }}" --dest "${RUNNER_TEMP}/kern-sdk-smoke" --no-path

      - name: Smoke Install Packaged SDK (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          cargo run -q -p kernup -- install --archive $env:ARTIFACT_FILE --dest "$env:RUNNER_TEMP\kern-sdk-smoke" --no-path

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: sdk-${{ env.ARTIFACT_FILE }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: error

      - name: Upload Toolchain Artifact
        uses: actions/upload-artifact@v6
        with:
          name: toolchain-${{ env.TOOLCHAIN_ARTIFACT_FILE }}
          path: ${{ env.TOOLCHAIN_ARTIFACT_FILE }}
          if-no-files-found: error

      - name: Package VS Code Extension
        if: matrix.target == 'x86_64-linux-gnu'
        working-directory: editors/vscode
        run: |
          VERSION=${KERN_RELEASE_VERSION#v}
          npm run package:vsix -- --out kern-vscode-${VERSION}.vsix
          cargo run -q -p kernworker -- ci verify-vsix --vsix kern-vscode-${VERSION}.vsix
          echo "VSCODE_ARTIFACT=kern-vscode-${VERSION}.vsix" >> $GITHUB_ENV

      - name: Upload VS Code Extension Artifact
        if: matrix.target == 'x86_64-linux-gnu'
        uses: actions/upload-artifact@v6
        with:
          name: vscode-${{ env.VSCODE_ARTIFACT }}
          path: editors/vscode/${{ env.VSCODE_ARTIFACT }}
          if-no-files-found: error

  verify-published-toolchain:
    name: Verify Published Toolchain ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: publish-toolchain-release
    if: github.event_name == 'push'
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Published LLVM
        uses: ./.github/actions/setup-llvm
        with:
          mode: target
          host-target: ${{ matrix.target }}

      - name: Activate Published Toolchain (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> "$GITHUB_ENV"

      - name: Activate Published Toolchain (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci activate-toolchain --format github-env >> $env:GITHUB_ENV

      - name: Print Published Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Print Published Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-info

      - name: Assert Published Toolchain Health (Unix)
        if: runner.os != 'Windows'
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Assert Published Toolchain Health (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo run -q -p kernworker -- ci toolchain-health

      - name: Verify ThinLTO Craft Path (Unix)
        if: runner.os != 'Windows'
        run: cargo test -p craft release_thinlto_build_produces_runnable_binary -- --exact

      - name: Verify ThinLTO Craft Path (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: cargo test -p craft release_thinlto_build_produces_runnable_binary -- --exact

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - build
      - verify-published-toolchain
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: sdk-*
          path: dist
          merge-multiple: true

      - name: Download VS Code Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: vscode-*
          path: dist
          merge-multiple: true

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-toolchain-release:
    name: Publish Toolchain Release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Resolve Toolchain Release Version
        run: |
          cargo run -q -p kernworker -- ci toolchain-spec --runner-os Linux --mode current --host-target x86_64-linux-gnu --format github-env >> "$GITHUB_ENV"

      - name: Resolve Toolchain Release Tag
        run: |
          test -n "${KERN_CI_LLVM_VERSION}"
          echo "KERN_TOOLCHAIN_RELEASE_TAG=toolchain-llvm-${KERN_CI_LLVM_VERSION}" >> "$GITHUB_ENV"

      - name: Download Toolchain Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: toolchain-*
          path: toolchain-dist
          merge-multiple: true

      - name: Generate Toolchain Checksums
        run: |
          cargo run -q -p kernworker -- release write-checksums "toolchain-dist/*" --manifest-path "toolchain-dist/toolchain-release-manifest.json" --channel toolchain --release-tag "${KERN_TOOLCHAIN_RELEASE_TAG}"

      - name: Upload Toolchain Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.KERN_TOOLCHAIN_RELEASE_TAG }}
          name: Kern Toolchain LLVM ${{ env.KERN_CI_LLVM_VERSION }}
          files: toolchain-dist/*
          overwrite_files: true
          generate_release_notes: false
          make_latest: false
