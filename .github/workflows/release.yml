name: Release Kern Toolchain

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: Version label to use for a dry-run release build.
        required: true
        default: v0.0.0-dev

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            vsce_target: linux-x64
            artifact_ext: tar.gz
            test_mode: all
          - os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            vsce_target: win32-x64
            artifact_ext: zip
            test_mode: smoke
          - os: macos-15-intel
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            vsce_target: darwin-x64
            artifact_ext: tar.gz
            test_mode: all
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            vsce_target: darwin-arm64
            artifact_ext: tar.gz
            test_mode: all

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm

      - name: Configure ThinLTO CI Toolchain (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/ci-llvm-clang.sh ./scripts/ci-llvm-clang++.sh ./scripts/print_ci_toolchain_info.sh
          echo "CC=${GITHUB_WORKSPACE}/scripts/ci-llvm-clang.sh" >> "$GITHUB_ENV"
          echo "CXX=${GITHUB_WORKSPACE}/scripts/ci-llvm-clang++.sh" >> "$GITHUB_ENV"
          echo "KERN_DEBUG_LTO_LINK=1" >> "$GITHUB_ENV"

      - name: Print CI Toolchain Diagnostics (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/print_ci_toolchain_info.sh

      - name: Print CI Toolchain Diagnostics (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\print_ci_toolchain_info.ps1

      - name: Install VS Code Extension Dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Resolve Release Version (Unix)
        if: runner.os != 'Windows'
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "KERN_RELEASE_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          else
            echo "KERN_RELEASE_VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_ENV"
          fi

      - name: Resolve Release Version (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            echo "KERN_RELEASE_VERSION=${{ inputs.version }}" >> $env:GITHUB_ENV
          } else {
            $version = $env:GITHUB_REF.Replace("refs/tags/", "")
            echo "KERN_RELEASE_VERSION=$version" >> $env:GITHUB_ENV
          }

      - name: Run kernc Integration Tests (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/run_kernc_cli_tests.sh ${{ matrix.test_mode }}

      - name: Run kernc Integration Tests (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\run_kernc_cli_tests.ps1 -Mode ${{ matrix.test_mode }}

      - name: Check craft Release Source Policy (Unix)
        if: runner.os != 'Windows'
        run: bash ./scripts/run_craft_policy_checks.sh

      - name: Check craft Release Source Policy (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: .\scripts\run_craft_policy_checks.ps1

      - name: Package Toolchain (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release -p kernc_cli --bin kernc
          cargo build --release -p craft
          cargo build --release -p kern-lsp
          VERSION=${KERN_RELEASE_VERSION}
          ./scripts/package_release.sh "$VERSION" "${{ matrix.target }}" --skip-build
          echo "ARTIFACT_FILE=kern-${VERSION}-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $GITHUB_ENV

      - name: Package Toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          cargo build --release -p kernc_cli --bin kernc
          cargo build --release -p craft
          cargo build --release -p kern-lsp
          $VERSION = $env:KERN_RELEASE_VERSION
          .\scripts\package_release.ps1 -Version $VERSION -Target ${{ matrix.target }} -SkipBuild
          echo "ARTIFACT_FILE=kern-$VERSION-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $env:GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_FILE }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: error

      - name: Package VS Code Extension (Unix)
        if: runner.os != 'Windows'
        working-directory: editors/vscode
        run: |
          VERSION=${KERN_RELEASE_VERSION#v}
          npm run package:vsix -- --target ${{ matrix.vsce_target }} --server-source ../../target/release/kern-lsp --out kern-vscode-${VERSION}-${{ matrix.vsce_target }}.vsix
          echo "VSCODE_ARTIFACT=kern-vscode-${VERSION}-${{ matrix.vsce_target }}.vsix" >> $GITHUB_ENV

      - name: Package VS Code Extension (Windows)
        if: runner.os == 'Windows'
        working-directory: editors/vscode
        shell: powershell
        run: |
          $VERSION = $env:KERN_RELEASE_VERSION.TrimStart('v')
          npm run package:vsix -- --target ${{ matrix.vsce_target }} --server-source ..\..\target\release\kern-lsp.exe --out kern-vscode-$VERSION-${{ matrix.vsce_target }}.vsix
          echo "VSCODE_ARTIFACT=kern-vscode-$VERSION-${{ matrix.vsce_target }}.vsix" >> $env:GITHUB_ENV

      - name: Upload VS Code Extension Artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.VSCODE_ARTIFACT }}
          path: editors/vscode/${{ env.VSCODE_ARTIFACT }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kern-*
          path: dist
          merge-multiple: true

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
