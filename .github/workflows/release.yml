name: Release Kern Compiler

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux-gnu
            rust_target: x86_64-unknown-linux-gnu
            artifact_ext: tar.gz
          - os: windows-latest
            target: x86_64-windows-msvc
            rust_target: x86_64-pc-windows-msvc
            artifact_ext: zip
          - os: macos-13
            target: x86_64-apple-darwin
            rust_target: x86_64-apple-darwin
            artifact_ext: tar.gz
          - os: macos-14
            target: aarch64-apple-darwin
            rust_target: aarch64-apple-darwin
            artifact_ext: tar.gz

    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Cargo Artifacts
        uses: Swatinem/rust-cache@v2

      - name: Setup LLVM
        uses: ./.github/actions/setup-llvm

      - name: Run kernc Integration Tests
        run: cargo test -p kernc_cli --tests

      - name: Package Toolchain (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cargo build --release -p kernc_cli --bin kernc
          VERSION=${GITHUB_REF#refs/tags/}
          ./scripts/package_release.sh "$VERSION" "${{ matrix.target }}" --skip-build
          echo "ARTIFACT_FILE=kern-${VERSION}-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $GITHUB_ENV

      - name: Package Toolchain (Windows)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          cargo build --release -p kernc_cli --bin kernc
          $VERSION = $env:GITHUB_REF.Replace("refs/tags/", "")
          .\scripts\package_release.ps1 -Version $VERSION -Target ${{ matrix.target }} -SkipBuild
          echo "ARTIFACT_FILE=kern-$VERSION-${{ matrix.target }}.${{ matrix.artifact_ext }}" >> $env:GITHUB_ENV

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_FILE }}
          path: ${{ env.ARTIFACT_FILE }}
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download Release Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: kern-*
          path: dist
          merge-multiple: true

      - name: Upload Release Artifact
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
