[package]
name = "bed"
version = "0.1.0"
kern = "0.7.2"
publish = false
description = "Brisk editor: a Kern-hosted lightweight nvim-core incubator"
readme = "README.md"
license = "MIT"

[runtime]
entry = "rt"
libc = false
bundle = "std"

[lib]
root = "src/lib.rn"

[[bin]]
name = "bed"
root = "src/main.rn"

[test]
roots = ["tests/smoke.rn"]
